[File Parameters]
# TIFF file input path and filename
input_path = 

# Base filename (without channel suffix or extension)
filename = 

# File extension (e.g. tif)
extension = 

# Set to 1 for two-channel (FRET) mode, 0 or empty for single-channel mode.
second_channel = 

# Choose either a continuous range of frames (colon-separated) or manually pick specific frames (comma-separated)
frames = 

# Bit depth of input images (8, 12, or 16)
resolution = 

# Parallelization option (1 = enabled, 0 or empty = disabled)
parallel = 

[Modules]
# Modules must be run sequentially
# 0 -> Background subtraction (acceptor)
# 1 -> Background subtraction (donor)
# 2 -> Ratio processing
# 3 -> Background subtraction (both channels) + ratio processing
# 4 -> Bleach correction (Optional)
option = 

[Background Parameters]
# Number of tiles that should fit along the long axis of the image (Suggested value for 1280X960 resolution is 40)
nwindow = 

# Eps value for DBSCAN algorithm (Suggested value is 0.01)
# Eps values are set separately for acceptor [0] and donor [1] channels
# Higher values result in more foreground (0 means the channel is not processed)
eps = 

[Ratio Parameters]
# Crop pixels by left top corner and right bottom corner coordinates [x0,y0,x1,y1] (0,0,0,0 = no crop)
crop = 

# Image registration for donor and acceptor channels (1 = enabled, 0 or empty = enabled)
register = 

# Consider only foreground pixels overlapping between donor and acceptor channels (1 = enabled, 0 or empty = enabled)
union = 

[Bleach Parameters]
# Bleach range for time-based intensity correction of acceptor channel (e.g. 1:100)
acceptor_bleach_range = 

# Bleach range for time-based intensity correction of donor channel (e.g. 1:100, two-channel mode only)
donor_bleach_range = 

# Bleach decay fit type (linear, exponential or loess)
fit = 
